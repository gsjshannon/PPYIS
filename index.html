<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enroll to Phou Panya International School</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#87CEEB 0%,#dff6ff 55%,#d8f3dc 100%);
position:relative;
}

/* Clouds */

.cloud{
position:absolute;
font-size:55px;
animation:cloud 35s linear infinite;
opacity:.8;
}

.c1{top:50px;left:-100px;}
.c2{top:120px;left:-300px;animation-duration:45s;}
.c3{top:180px;left:-500px;animation-duration:55s;}

@keyframes cloud{
to{
transform:translateX(1700px);
}
}

/* Flowers */

.flower{
position:absolute;
font-size:42px;
animation:float 5s ease-in-out infinite;
}

.f1{top:40px;left:40px;}
.f2{top:140px;right:60px;animation-delay:1s;}
.f3{bottom:170px;left:60px;animation-delay:2s;}
.f4{bottom:120px;right:120px;animation-delay:3s;}
.f5{top:250px;left:85%;animation-delay:4s;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* Mountains */

.mountain{
position:absolute;
bottom:110px;
width:0;
height:0;
border-left:170px solid transparent;
border-right:170px solid transparent;
border-bottom:250px solid #6ab04c;
opacity:.45;
}

.m1{left:-20px;}
.m2{left:250px;border-bottom-color:#78c26d;}
.m3{right:-20px;}

/* River */

.river{
position:absolute;
bottom:0;
width:100%;
height:110px;
background:linear-gradient(#5bc0ff,#2196f3);
overflow:hidden;
}

.river:before{
content:"";
position:absolute;
width:200%;
height:100%;
background:
radial-gradient(circle at 25px 20px,rgba(255,255,255,.4) 2px,transparent 3px);
animation:wave 8s linear infinite;
}

@keyframes wave{
from{transform:translateX(0);}
to{transform:translateX(-300px);}
}

/* Card */

.card{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
text-align:center;
width:700px;
z-index:5;
}

h1{
font-size:38px;
color:#1e7d32;
margin-bottom:10px;
}

.subtitle{
margin-bottom:30px;
color:#555;
}

.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
margin-top:20px;
}

button{
padding:18px;
font-size:20px;
border:none;
border-radius:14px;
cursor:pointer;
transition:.25s;
font-weight:bold;
}

.yes{
background:#43a047;
color:white;
}

.yes:hover{
transform:scale(1.07);
}

#no{
background:#ef5350;
color:white;
}

.shake{
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

#message{
margin-top:25px;
font-size:22px;
}

</style>

</head>

<body>

<div class="cloud c1">☁️</div>
<div class="cloud c2">☁️</div>
<div class="cloud c3">☁️</div>

<div class="flower f1">🌸</div>
<div class="flower f2">🌺</div>
<div class="flower f3">🌼</div>
<div class="flower f4">🌷</div>
<div class="flower f5">🌸</div>

<div class="mountain m1"></div>
<div class="mountain m2"></div>
<div class="mountain m3"></div>

<div class="river"></div>

<div class="card" id="card">

<h1>🎓 Enroll to<br>Phou Panya International School</h1>

<p class="subtitle">
Choose the option that best describes you. 😄
</p>

<div class="buttons" id="buttons">

<button class="yes" onclick="yes()">Yes! 🎉</button>
<button class="yes" onclick="yes()">Absolutely! 💚</button>
<button class="yes" onclick="yes()">Count Me In! 📚</button>
<button class="yes" onclick="yes()">Let's Go! 🚀</button>

<button id="no" onclick="noClick()">No 😒</button>

</div>

<div id="message"></div>

</div>

<script>

let noCount=0;

const funny=[
"🤨 Are you sure?",
"😅 Really sure?",
"😂 That doesn't sound right.",
"🥺 Give us another chance!",
"😭 The flowers are sad.",
"🌸 Even the Dok Champa disagrees.",
"🏞️ The Mekong River says YES!",
"📚 Future student detected...",
"😆 You're enjoying clicking NO, aren't you?",
"🎓 The principal is waiting...",
"🏆 Achievement Unlocked:<br>Professional NO Clicker!",
"🤣 Fine... I give up!"
];

const noLabels=[
"No 😒",
"Nope",
"Nah",
"Still No",
"Maybe?",
"Oops",
"Wrong Button",
"Help 😭",
"I'm Tiny",
"Click YES 😂",
"Please...",
"💀"
];

function noClick(){

const card=document.getElementById("card");
card.classList.add("shake");
setTimeout(()=>card.classList.remove("shake"),300);

document.getElementById("message").innerHTML=
"<b>"+funny[Math.min(noCount,funny.length-1)]+"</b>";

document.querySelectorAll(".yes").forEach(btn=>{

let size=parseFloat(btn.dataset.size||1);
size+=0.15;
btn.dataset.size=size;
btn.style.transform=`scale(${size})`;

});

const no=document.getElementById("no");

no.style.position="relative";
no.style.left=(Math.random()*220-110)+"px";
no.style.top=(Math.random()*100-50)+"px";

no.style.transform=`
scale(${Math.max(.25,1-noCount*.08)})
rotate(${Math.random()*40-20}deg)
`;

no.style.background=`hsl(${Math.random()*360},80%,60%)`;
no.innerHTML=noLabels[Math.min(noCount,noLabels.length-1)];

noCount++;

if(noCount>11){

no.disabled=true;

document.getElementById("message").innerHTML=
"<h2>😂 There is no valid NO answer.<br>Please click one of the YES buttons instead!</h2>";

}

}

function yes(){

document.getElementById("card").innerHTML=`

<h1>🎉 Great Choice! 🎉</h1>

<p style="font-size:24px;margin-top:20px;">

Welcome! 💚

<br><br>

Please message

<br><br>

<b>Phou Panya International School</b>

<br><br>

for admissions and inquiries.

</p>

<h2 style="margin-top:25px;">

Redirecting in <span id="count">5</span>...

</h2>

`;

let sec=5;

const timer=setInterval(()=>{

sec--;

document.getElementById("count").innerHTML=sec;

if(sec==0){

clearInterval(timer);

window.location.href="https://www.facebook.com/phoupanyaschool";

}

},1000);

}

</script>

</body>
</html>
